<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Image Background Remover (Stable)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.20.0/dist/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.20.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-segmentation@1.0.2/dist/body-segmentation.min.js"></script>
    
    <style>
        /* 透明棋盤格背景 */
        .checkboard {
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                              linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .img-card { border: 2px solid transparent; transition: all 0.2s; }
        .img-card.selected { border-color: #2563eb; background-color: #eff6ff; transform: translateY(-2px); }
        
        /* 載入動畫 */
        .spin {
            width: 18px; height: 18px; border: 2px solid #fff;
            border-top: 2px solid transparent; border-radius: 50%;
            animation: rotate 0.8s linear infinite;
            display: inline-block; vertical-align: middle;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* 防止圖片選取時閃爍 */
        #resultsSection img { -webkit-user-drag: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">CC Image Background Remover</h1>
            <p class="text-gray-500">搜尋 CC 圖片，選圖，一鍵去背，下載透明 PNG (標準環境穩定版)</p>
            <div class="flex flex-wrap justify-center gap-2 mt-6">
                <div class="bg-white px-4 py-2 rounded-lg shadow-sm border text-xs font-bold text-gray-600">Step 1 搜尋圖片</div>
                <div class="bg-white px-4 py-2 rounded-lg shadow-sm border text-xs font-bold text-gray-600">Step 2 選擇圖片</div>
                <div class="bg-white px-4 py-2 rounded-lg shadow-sm border text-xs font-bold text-gray-600">Step 3 去背下載</div>
            </div>
        </header>

        <section class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="searchInput" placeholder="輸入英文關鍵字，例如: cat, travel, portrait" 
                       class="flex-1 border border-gray-300 rounded-xl px-5 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                <button onclick="searchImages()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl transition flex items-center justify-center">
                    <span id="searchBtnText">搜尋圖片</span>
                </button>
                <button onclick="changeBatch()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-6 py-3 rounded-xl transition">換一批</button>
            </div>
            <div id="statusLabel" class="mt-3 text-sm text-gray-500 min-h-[20px] flex items-center gap-2">
                請輸入關鍵字開始搜尋
            </div>
        </section>

        <section id="resultsSection" class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-5 gap-4 mb-8">
            </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="font-bold text-gray-700 mb-4 flex justify-between items-center">
                    <span>原圖預覽</span>
                    <span id="resTag" class="text-xs font-mono text-gray-400"></span>
                </h3>
                <div id="originalBox" class="bg-gray-100 rounded-xl overflow-hidden flex items-center justify-center min-h-[350px]">
                    <p class="text-gray-400 text-sm">請先選擇圖片</p>
                </div>
                <button id="aiBtn" onclick="runAI()" disabled 
                        class="w-full mt-5 bg-blue-600 disabled:bg-gray-200 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-blue-100 flex items-center justify-center gap-2">
                    <span id="aiBtnText">一鍵 AI 去背</span>
                </button>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <h3 class="font-bold text-gray-700 mb-4">去背後預覽 (PNG)</h3>
                <div id="resultBox" class="checkboard rounded-xl flex items-center justify-center min-h-[350px] overflow-auto">
                    <p class="text-gray-400 text-sm">去背結果會顯示在這裡</p>
                </div>
                <button id="dlBtn" onclick="downloadPNG()" disabled 
                        class="w-full mt-5 bg-emerald-600 disabled:bg-gray-200 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-50">
                    下載透明 PNG
                </button>
            </div>
        </section>

        <section class="bg-gray-900 text-gray-300 p-6 rounded-2xl shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-white font-bold">授權引用標示</h3>
                <button onclick="copyAttr()" class="text-xs bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg border border-gray-700 transition">複製標示</button>
            </div>
            <div id="attrInfo" class="text-sm space-y-1 font-mono leading-relaxed overflow-x-auto">
                尚未選擇圖片
            </div>
        </section>
    </div>

    <script>
        // --- 狀態與全域變數 ---
        let imgList = [];
        let selectedIdx = -1;
        let searchOffset = 0;
        let isSearching = false;
        let isProcessingAI = false;
        let segModel = null; // AI 模型實例

        // HTML 元素引用
        const elResults = document.getElementById('resultsSection');
        const elOriginalBox = document.getElementById('originalBox');
        const elResultBox = document.getElementById('resultBox');
        const elAiBtn = document.getElementById('aiBtn');
        const elAiBtnText = document.getElementById('aiBtnText');
        const elDlBtn = document.getElementById('dlBtn');
        const elStatus = document.getElementById('statusLabel');
        const elSearchText = document.getElementById('searchBtnText');

        // --- Step 1: 搜尋圖片 (Wikimedia Commons) ---
        
        async function searchImages() {
            if (isSearching) return;
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return updateStatus("⚠️ 請先輸入英文關鍵字");
            searchOffset = 0;
            resetUI();
            await performSearch(query);
        }

        async function changeBatch() {
            if (isSearching) return;
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            searchOffset += 10;
            resetUI();
            await performSearch(query);
        }

        async function performSearch(q) {
            isSearching = true;
            elSearchText.innerHTML = '<span class="spin mr-2"></span>搜尋中...';
            updateStatus("正在向 Wikimedia Commons 搜尋大尺寸圖片...", true);
            
            try {
                // Wikimedia API: 限定 File 空間, JPEG/PNG
                const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(q)}&gsrnamespace=6&gsrlimit=20&gsroffset=${searchOffset}&prop=imageinfo&iiprop=url|size|extmeta|mime&format=json&origin=*`;
                const res = await fetch(url);
                const data = await res.json();

                if (!data.query) {
                    updateStatus("❌ 找不到符合的大尺寸圖片，請更換英文關鍵字。");
                    imgList = [];
                    elResults.innerHTML = '';
                    return;
                }

                // 過濾尺寸至少 800x600，且 CORS 可用的圖片
                imgList = Object.values(data.query.pages)
                    .filter(p => p.imageinfo && p.imageinfo[0].width >= 800 && p.imageinfo[0].height >= 600)
                    .filter(p => ['image/jpeg', 'image/png'].includes(p.imageinfo[0].mime))
                    .map(p => {
                        const info = p.imageinfo[0];
                        const meta = info.extmeta || {};
                        return {
                            title: p.title.replace("File:", "").split('.')[0],
                            url: info.url,
                            w: info.width,
                            h: info.height,
                            creator: meta.Artist ? meta.Artist.value.replace(/<[^>]*>?/gm, '') : "Unknown",
                            license: meta.LicenseShortName ? meta.LicenseShortName.value : "CC BY-SA",
                            licenseUrl: meta.LicenseUrl ? meta.LicenseUrl.value : null,
                            source: `https://commons.wikimedia.org/wiki/${encodeURIComponent(p.title)}`
                        };
                    }).slice(0, 5); // 取前 5 張

                if (imgList.length === 0) {
                    updateStatus("⚠️ 當前批次無合適尺寸圖片，請點擊「換一批」試試。");
                } else {
                    updateStatus(`✅ 找到 ${imgList.length} 張候選圖片`);
                    renderCards();
                }
            } catch (e) {
                updateStatus("❌ 連線失敗，請檢查網路。");
                console.error(e);
            } finally {
                isSearching = false;
                elSearchText.innerText = "搜尋圖片";
            }
        }

        function renderCards() {
            elResults.innerHTML = imgList.map((img, i) => `
                <div class="img-card bg-white rounded-xl shadow-sm overflow-hidden cursor-pointer hover:shadow-md ${selectedIdx === i ? 'selected' : ''}" onclick="selectImage(${i})">
                    <div class="h-32 bg-gray-200">
                        <img src="${img.url}" class="w-full h-full object-cover" loading="lazy" crossorigin="anonymous">
                    </div>
                    <div class="p-2 text-[10px] text-gray-500">
                        <p class="font-bold text-gray-700 truncate">${img.title}</p>
                        <p>${img.w} x ${img.h}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- Step 2: 選擇圖片 ---

        function selectImage(i) {
            if (isProcessingAI) return;
            selectedIdx = i;
            renderCards();
            const img = imgList[i];
            
            // 預覽原圖 (需要 crossorigin=anonymous 才能進行去背)
            elOriginalBox.innerHTML = `<img src="${img.url}" id="srcImg" crossorigin="anonymous" class="max-h-[500px] object-contain shadow-xl">`;
            document.getElementById('resTag').innerText = `${img.w} x ${img.h} PX`;
            
            // 更新引用標示
            document.getElementById('attrInfo').innerHTML = `
                <p><strong>圖片：</strong>${img.title}</p>
                <p><strong>作者：</strong>${img.creator}</p>
                <p><strong>授權：</strong>${img.licenseUrl ? `<a href="${img.licenseUrl}" target="_blank" class="text-blue-400 underline">${img.license}</a>` : img.license}</p>
                <p><strong>來源：</strong><a href="${img.source}" target="_blank" class="text-blue-400 underline">${img.source}</a></p>
                <p><strong>平台：</strong>Wikimedia Commons</p>
            `;

            elAiBtn.disabled = false;
            elDlBtn.disabled = true;
            elResultBox.innerHTML = '<p class="text-gray-400 text-sm">等待去背指令...</p>';
            updateStatus("已選取圖片，請點擊「一鍵 AI 去背」");
            
            // 如果 AI 錯誤區域有東西，清除它
            const oldCanvas = document.getElementById('segCanvas');
            if(oldCanvas) oldCanvas.remove();
        }

        // --- Step 3: 一鍵 AI 去背 (Stable TensorFlow.js 版) ---

        async function runAI() {
            if (isProcessingAI || selectedIdx === -1) return;
            
            const srcImg = document.getElementById('srcImg');
            if (!srcImg) return updateStatus("❌ 原圖載入出錯，請重新選圖。");

            isProcessingAI = true;
            elAiBtn.disabled = true;
            elDlBtn.disabled = true;
            elAiBtnText.innerHTML = '<span class="spin mr-2"></span>AI 運算中...';
            elResultBox.innerHTML = '<p class="text-blue-600 text-sm">正在初始化 AI 模型並進行分割 (請勿關閉網頁)...</p>';
            updateStatus("正在進行本地 AI 運算 (初次執行需 5-10 秒載入模型檔案)...", true);

            // 清除之前的結果
            const oldCanvas = document.getElementById('segCanvas');
            if(oldCanvas) oldCanvas.remove();

            try {
                // 1. 初始化模型 (如果尚未載入)
                if (!segModel) {
                    updateStatus("正在下載 AI 模型檔案 (僅初次需下載，約 5MB)...", true);
                    const config = {
                        runtime: 'tfjs', // 使用 TensorFlow.js 執行階段
                        modelType: 'general' // 通用人像分割模型，較穩定
                    };
                    segModel = await bodySegmentation.createSegmenter(
                        bodySegmentation.SupportedModels.MediaPipeSelfieSegmentation, 
                        config
                    );
                }

                updateStatus("AI 模型已就緒，開始進行像素分割...", true);

                // 2. 為了穩定性，先將外部圖片畫入 canvas，解決 Worker CORS 潛在問題
                const inputCanvas = document.createElement('canvas');
                inputCanvas.width = srcImg.naturalWidth;
                inputCanvas.height = srcImg.naturalHeight;
                inputCanvas.getContext('2d', {alpha: false}).drawImage(srcImg, 0, 0);

                // 3. 執行人像分割運算 (完全在瀏覽器本地執行)
                const segmentation = await segModel.segmentPeople(inputCanvas);
                
                // 4. 將分割結果應用到畫布 (建立透明 PNG)
                updateStatus("正在合成透明 PNG 結果圖片...", true);
                const finalCanvas = processMask(inputCanvas, segmentation[0]);
                finalCanvas.id = 'segCanvas';
                finalCanvas.style.maxHeight = '500px';
                finalCanvas.style.objectFit = 'contain';

                // 5. 顯示結果
                elResultBox.innerHTML = '';
                elResultBox.appendChild(finalCanvas);
                
                elDlBtn.disabled = false;
                updateStatus("✅ 去背完成！(此模型針對人像優化，其他物體效果可能有限)");
                elResultBox.innerHTML = '<p class="text-emerald-600 text-xs mb-1">提示: 此模式適用於人像/寵物，對通用物體去背能力有限。</p>';
                elResultBox.appendChild(finalCanvas);

            } catch (err) {
                console.error("TensorFlow AI Error:", err);
                elResultBox.innerHTML = '<p class="text-red-600 text-sm">❌ 本地去背失敗。</p><p class="text-gray-500 text-xs mt-1">失敗原因可能為：瀏覽器不支援硬體加速、圖片格式錯誤或 CORS 限制。</p>';
                updateStatus("❌ 本地去背失敗。");
            } finally {
                isProcessingAI = false;
                elAiBtn.disabled = false;
                elAiBtnText.innerText = "一鍵 AI 去背";
            }
        }

        // 像素處理核心：將遮罩應用於原圖
        function processMask(originalCanvas, segmentation) {
            const width = originalCanvas.width;
            const height = originalCanvas.height;
            const resultCanvas = document.createElement('canvas');
            resultCanvas.width = width;
            resultCanvas.height = height;
            const resultCtx = resultCanvas.getContext('2d');

            // 如果沒有偵測到分割，返回空畫布（代表全部透明）
            if (!segmentation || !segmentation.mask) return resultCanvas;

            // 1. 將遮罩轉為影像資料
            // 由於 Mediapipe 回傳的是 Tensor，在 tfjs 模式下通常是畫在 canvas 上的二進制格式
            // 這裡直接使用 TensorFlow.js 的輔助函式將遮罩畫到畫布上
            const tempMaskCanvas = document.createElement('canvas');
            tempMaskCanvas.width = width;
            tempMaskCanvas.height = height;

            // segmentation.mask 回傳一個具有 Uint8Array 的對象，包含遮罩數據
            const maskData = new ImageData(
                new Uint8ClampedArray(width * height * 4),
                width,
                height
            );

            // 遮罩處理： Mediapipe 的 general 模型，遮罩中人像是 255，背景是 0
            // 我們需要人像透明度是 255 (不透明)，背景透明度是 0 (透明)
            for (let i = 0; i < segmentation.mask.mask.length; i++) {
                const isForeground = segmentation.mask.mask[i] > 128; // 閾值判斷，大於 128 為前景

                if (isForeground) {
                    maskData.data[i * 4 + 0] = 255; // R
                    maskData.data[i * 4 + 1] = 255; // G
                    maskData.data[i * 4 + 2] = 255; // B
                    maskData.data[i * 4 + 3] = 255; // Alpha: 不透明
                } else {
                    maskData.data[i * 4 + 0] = 0;
                    maskData.data[i * 4 + 1] = 0;
                    maskData.data[i * 4 + 2] = 0;
                    maskData.data[i * 4 + 3] = 0; // Alpha: 完全透明
                }
            }
            tempMaskCanvas.getContext('2d').putImageData(maskData, 0, 0);

            // 2. 使用 canvas 的混合模式 (Compositing) 將遮罩應用於原圖
            // 方法：先畫遮罩，然後畫原圖，混合模式設為 source-in，只保留原圖在遮罩範圍內的部分
            
            // A. 先畫一個完整的遮罩，其中人像部分是不透明黑色，背景是透明
            const compositeCanvas = document.createElement('canvas');
            compositeCanvas.width = width;
            compositeCanvas.height = height;
            const compositeCtx = compositeCanvas.getContext('2d');
            compositeCtx.fillStyle = 'black';
            compositeCtx.fillRect(0, 0, width, height);

            // B. 用 mask 進行透明度處理
            compositeCtx.globalCompositeOperation = 'destination-in';
            compositeCtx.drawImage(tempMaskCanvas, 0, 0);

            // C. 此時 compositeCanvas 是前景黑色背景透明。現在混合原圖。
            resultCtx.drawImage(compositeCanvas, 0, 0);
            resultCtx.globalCompositeOperation = 'source-in';
            resultCtx.drawImage(originalCanvas, 0, 0);

            return resultCanvas;
        }

        // --- 功能功能: 下載 & 複製 ---

        function downloadPNG() {
            const canvas = document.getElementById('segCanvas');
            if (!canvas) return;
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = `cc-removed-${imgList[selectedIdx].title}-${Date.now()}.png`;
            a.click();
        }

        function copyAttr() {
            if (selectedIdx === -1) return alert("請先選取圖片");
            const info = document.getElementById('attrInfo').innerText;
            navigator.clipboard.writeText(info).then(() => alert("✅ 授權引用標示已複製到剪貼簿。"));
        }

        // --- 公共 UI 函數 ---

        function updateStatus(msg, spin = false) {
            elStatus.innerHTML = spin ? `<span class="spin border-gray-400 border-t-blue-600 mr-2"></span> <span>${msg}</span>` : `<span>${msg}</span>`;
        }

        function resetUI() {
            selectedIdx = -1;
            document.getElementById('attrInfo').innerHTML = '尚未選擇圖片';
            elResults.innerHTML = '';
            elOriginalBox.innerHTML = '<p class="text-gray-400 text-sm">請先選擇圖片</p>';
            elResultBox.innerHTML = '<p class="text-gray-400 text-sm">去背結果會顯示在這裡</p>';
            document.getElementById('resTag').innerText = '';
            elAiBtn.disabled = true;
            elDlBtn.disabled = true;
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchImages();
        });
    </script>
</body>
</html>
