<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Image Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .checkboard {
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                              linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .image-card { border: 2px solid transparent; transition: 0.3s; }
        .image-card.selected { border-color: #2563eb; background-color: #eff6ff; }
        .loading-spin {
            width: 20px; height: 20px; border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">CC Image Background Remover</h1>
            <p class="text-slate-500">搜尋 CC 圖片，選圖，一鍵去背，下載透明 PNG</p>
            <div class="flex justify-center gap-4 mt-6 text-sm font-medium">
                <span class="bg-white px-4 py-2 rounded-full shadow-sm border">1. 搜尋</span>
                <span class="bg-white px-4 py-2 rounded-full shadow-sm border">2. 選圖</span>
                <span class="bg-white px-4 py-2 rounded-full shadow-sm border">3. 去背下載</span>
            </div>
        </header>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="searchInput" placeholder="輸入關鍵字 (如: dog, flower, car)" 
                       class="flex-1 border border-slate-300 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500 transition">
                <button onclick="searchImages()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl transition">搜尋圖片</button>
                <button onclick="changeBatch()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-6 py-3 rounded-xl transition">換一批</button>
            </div>
            <div id="statusLabel" class="mt-4 text-sm text-slate-500 flex items-center gap-2 min-h-[24px]">
                請在上方輸入關鍵字開始搜尋
            </div>
        </section>

        <section id="resultsSection" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-10">
            </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold mb-4 flex justify-between items-center text-slate-700">
                    <span>1. 原始圖片</span>
                    <span id="resText" class="text-xs font-mono text-slate-400"></span>
                </h3>
                <div id="originalBox" class="bg-slate-100 rounded-xl overflow-hidden flex items-center justify-center min-h-[350px]">
                    <p class="text-slate-400">尚未選擇圖片</p>
                </div>
                <button id="aiBtn" onclick="processAIRemoval()" disabled
                        class="w-full mt-6 bg-blue-600 disabled:bg-slate-200 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition">
                    一鍵 AI 去背
                </button>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="font-bold mb-4 text-slate-700">2. 去背結果</h3>
                <div id="resultBox" class="checkboard rounded-xl overflow-hidden flex items-center justify-center min-h-[350px]">
                    <p class="text-slate-400">處理後將在此顯示</p>
                </div>
                <button id="dlBtn" onclick="downloadImage()" disabled
                        class="w-full mt-6 bg-emerald-600 disabled:bg-slate-200 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition">
                    下載透明 PNG
                </button>
            </div>
        </section>

        <section class="bg-slate-100 p-4 rounded-xl mb-10 border border-dashed border-slate-300">
            <h4 class="text-xs font-bold text-slate-500 mb-2 italic">備用方案 (適合白底或 AI 失敗時)</h4>
            <div class="flex flex-wrap gap-4 items-center">
                <button onclick="canvasSimpleRemove()" class="bg-white border border-slate-300 px-4 py-2 rounded-lg text-xs hover:bg-slate-50">移除白色背景</button>
                <div class="flex items-center gap-2 text-xs">
                    <span>容差:</span>
                    <input type="range" id="tolerance" min="1" max="100" value="30" class="accent-blue-600">
                </div>
            </div>
        </section>

        <section class="bg-slate-900 text-slate-300 p-6 rounded-2xl shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-white text-lg font-mono">Attribution Information</h3>
                <button onclick="copyInfo()" class="text-xs bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition border border-slate-700">複製資訊</button>
            </div>
            <div id="attrBox" class="text-sm space-y-1">
                尚未選擇圖片
            </div>
        </section>
    </div>

    <canvas id="helperCanvas" class="hidden"></canvas>

    <script type="module">
        // 導入最新的穩定版 AI 模組
        import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm";

        let images = [];
        let selectedIdx = -1;
        let offset = 0;
        let finalBlob = null;

        // 全域掛載，方便按鈕調用
        window.searchImages = searchImages;
        window.changeBatch = changeBatch;
        window.selectImage = selectImage;
        window.processAIRemoval = processAIRemoval;
        window.downloadImage = downloadImage;
        window.canvasSimpleRemove = canvasSimpleRemove;
        window.copyInfo = copyInfo;

        async function searchImages() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return updateStatus("請先輸入關鍵字");
            offset = 0;
            resetAll();
            await fetchData(q);
        }

        async function changeBatch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            offset += 15;
            resetAll();
            await fetchData(q);
        }

        async function fetchData(q) {
            updateStatus("正在從 Wikimedia Commons 抓取圖片...", true);
            try {
                // 限定 JPEG/PNG 並確保解析度
                const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(q)}&gsrnamespace=6&gsrlimit=30&gsroffset=${offset}&prop=imageinfo&iiprop=url|size|extmeta|mime&format=json&origin=*`;
                const res = await fetch(url);
                const data = await res.json();

                if (!data.query) return updateStatus("找不到圖片，請嘗試其他關鍵字 (英文較佳)");

                images = Object.values(data.query.pages)
                    .filter(p => p.imageinfo && p.imageinfo[0].width >= 800)
                    .filter(p => ['image/jpeg', 'image/png'].includes(p.imageinfo[0].mime))
                    .map(p => ({
                        title: p.title.replace("File:", "").split('.')[0],
                        url: p.imageinfo[0].url,
                        w: p.imageinfo[0].width,
                        h: p.imageinfo[0].height,
                        author: p.imageinfo[0].extmeta?.Artist?.value.replace(/<[^>]*>?/gm, '') || "Unknown",
                        license: p.imageinfo[0].extmeta?.LicenseShortName?.value || "CC BY-SA",
                        source: `https://commons.wikimedia.org/wiki/${encodeURIComponent(p.title)}`
                    })).slice(0, 5);

                if (images.length === 0) {
                    updateStatus("圖片尺寸過小或格式不符，請點擊換一批");
                } else {
                    updateStatus(`找到 ${images.length} 張候選圖片`);
                    render();
                }
            } catch (e) {
                updateStatus("載入失敗，請檢查網路連接");
            }
        }

        function render() {
            const container = document.getElementById('resultsSection');
            container.innerHTML = images.map((img, i) => `
                <div class="image-card bg-white rounded-xl shadow-sm overflow-hidden cursor-pointer hover:shadow-md ${selectedIdx === i ? 'selected' : ''}" onclick="selectImage(${i})">
                    <div class="h-40 bg-slate-200">
                        <img src="${img.url}" class="w-full h-full object-cover" loading="lazy">
                    </div>
                    <div class="p-3 text-[10px] text-slate-500">
                        <p class="font-bold text-slate-700 truncate">${img.title}</p>
                        <p>${img.w} x ${img.h} · ${img.license}</p>
                    </div>
                </div>
            `).join('');
        }

        function selectImage(i) {
            selectedIdx = i;
            render();
            const img = images[i];
            document.getElementById('originalBox').innerHTML = `<img src="${img.url}" id="srcImg" crossorigin="anonymous" class="max-h-[500px] object-contain">`;
            document.getElementById('resText').innerText = `${img.w} x ${img.h} PX`;
            document.getElementById('attrBox').innerHTML = `
                <p><strong>Title:</strong> ${img.title}</p>
                <p><strong>Creator:</strong> ${img.author}</p>
                <p><strong>License:</strong> ${img.license}</p>
                <p><strong>Source:</strong> <a href="${img.source}" target="_blank" class="text-blue-400 underline">Wikimedia Commons</a></p>
            `;
            document.getElementById('aiBtn').disabled = false;
            document.getElementById('dlBtn').disabled = true;
            document.getElementById('resultBox').innerHTML = '<p class="text-slate-400">等待處理...</p>';
            updateStatus("已選取圖片，點擊一鍵去背開始");
        }

        async function processAIRemoval() {
            const btn = document.getElementById('aiBtn');
            const img = images[selectedIdx];
            btn.disabled = true;
            btn.innerText = "正在初始化 AI 模型...";
            updateStatus("AI 正在載入模型 (初次執行約需 10-20 秒，請勿重新整理)", true);

            try {
                // 1. 強制轉 Blob 避免 CORS 在 Worker 內失效
                const blobRes = await fetch(img.url);
                const originalBlob = await blobRes.blob();

                // 2. 去背執行
                const resultBlob = await removeBackground(originalBlob, {
                    publicPath: "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/",
                    model: "small", // 使用 small 提高 GitHub Pages 上的執行成功率
                    progress: (key, cur, total) => {
                        const p = Math.round((cur / total) * 100);
                        updateStatus(`去背中: ${p}% (${key})`, true);
                    }
                });

                finalBlob = resultBlob;
                const url = URL.createObjectURL(resultBlob);
                document.getElementById('resultBox').innerHTML = `<img src="${url}" class="max-h-[500px] object-contain">`;
                document.getElementById('dlBtn').disabled = false;
                updateStatus("✅ 去背完成！");
            } catch (err) {
                console.error(err);
                updateStatus("❌ AI 處理失敗。可能是圖片尺寸過大或瀏覽器記憶體不足，請嘗試備用方案。");
            } finally {
                btn.innerText = "一鍵 AI 去背";
                btn.disabled = false;
            }
        }

        function canvasSimpleRemove() {
            const imgEl = document.getElementById('srcImg');
            if (!imgEl) return;
            const cvs = document.getElementById('helperCanvas');
            const ctx = cvs.getContext('2d');
            const tol = document.getElementById('tolerance').value;

            cvs.width = imgEl.naturalWidth;
            cvs.height = imgEl.naturalHeight;
            ctx.drawImage(imgEl, 0, 0);

            const imgData = ctx.getImageData(0, 0, cvs.width, cvs.height);
            const data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                // 檢查是否接近白色 (255)
                if (data[i] > 255 - tol && data[i+1] > 255 - tol && data[i+2] > 255 - tol) {
                    data[i+3] = 0;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            cvs.toBlob(b => {
                finalBlob = b;
                document.getElementById('resultBox').innerHTML = `<img src="${URL.createObjectURL(b)}" class="max-h-[500px] object-contain">`;
                document.getElementById('dlBtn').disabled = false;
                updateStatus("✅ 已移除白色背景");
            }, 'image/png');
        }

        function downloadImage() {
            if (!finalBlob) return;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(finalBlob);
            a.download = `cc-remover-${Date.now()}.png`;
            a.click();
        }

        function copyInfo() {
            const text = document.getElementById('attrBox').innerText;
            navigator.clipboard.writeText(text).then(() => alert("授權資訊已複製"));
        }

        function updateStatus(msg, spin = false) {
            const label = document.getElementById('statusLabel');
            label.innerHTML = spin ? `<div class="loading-spin"></div> ${msg}` : msg;
        }

        function resetAll() {
            images = []; selectedIdx = -1; finalBlob = null;
            document.getElementById('resultsSection').innerHTML = '';
            document.getElementById('originalBox').innerHTML = '<p class="text-slate-400">尚未選擇圖片</p>';
            document.getElementById('resultBox').innerHTML = '<p class="text-slate-400">處理後將在此顯示</p>';
            document.getElementById('aiBtn').disabled = true;
            document.getElementById('dlBtn').disabled = true;
            document.getElementById('resText').innerText = '';
        }
    </script>
</body>
</html>
