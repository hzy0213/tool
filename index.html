<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Image Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 透明棋盤格背景 */
        .checkboard {
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                              linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .img-card { border: 2px solid transparent; transition: all 0.2s; }
        .img-card.selected { border-color: #2563eb; background-color: #eff6ff; transform: translateY(-2px); }
        .spin {
            width: 18px; height: 18px; border: 2px solid #fff;
            border-top: 2px solid transparent; border-radius: 50%;
            animation: rotate 0.8s linear infinite;
            display: inline-block; vertical-align: middle;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">CC Image Background Remover</h1>
            <p class="text-gray-500">搜尋 CC 圖片，選圖，一鍵去背，下載透明 PNG</p>
            <div class="flex justify-center gap-4 mt-6">
                <div class="bg-white px-4 py-2 rounded-lg shadow-sm border text-xs font-bold">Step 1 搜尋圖片</div>
                <div class="bg-white px-4 py-2 rounded-lg shadow-sm border text-xs font-bold">Step 2 選擇圖片</div>
                <div class="bg-white px-4 py-2 rounded-lg shadow-sm border text-xs font-bold">Step 3 去背下載</div>
            </div>
        </header>

        <section class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-6">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="searchInput" placeholder="輸入關鍵字，例如 cat、robot、flower" 
                       class="flex-1 border border-gray-300 rounded-xl px-5 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                <button onclick="searchImages()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3 rounded-xl transition">搜尋圖片</button>
                <button onclick="changeBatch()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-6 py-3 rounded-xl transition">換一批</button>
            </div>
            <div id="statusLabel" class="mt-3 text-sm text-gray-500 min-h-[20px]">
                請輸入關鍵字開始搜尋
            </div>
        </section>

        <section id="resultsSection" class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-5 gap-4 mb-8">
            </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="font-bold text-gray-700 mb-4 flex justify-between">
                    <span>原圖預覽</span>
                    <span id="resTag" class="text-xs font-mono text-gray-400"></span>
                </h3>
                <div id="originalBox" class="bg-gray-100 rounded-xl overflow-hidden flex items-center justify-center min-h-[350px]">
                    <p class="text-gray-400 text-sm">請先選擇圖片</p>
                </div>
                <button id="aiBtn" onclick="runAI()" disabled 
                        class="w-full mt-5 bg-blue-600 disabled:bg-gray-200 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-blue-100">
                    一鍵 AI 去背
                </button>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                <h3 class="font-bold text-gray-700 mb-4">去背後預覽</h3>
                <div id="resultBox" class="checkboard rounded-xl overflow-hidden flex items-center justify-center min-h-[350px]">
                    <p class="text-gray-400 text-sm">去背結果會顯示在這裡</p>
                </div>
                <button id="dlBtn" onclick="downloadPNG()" disabled 
                        class="w-full mt-5 bg-emerald-600 disabled:bg-gray-200 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-50">
                    下載透明 PNG
                </button>
            </div>
        </section>

        <section class="bg-gray-100 p-4 rounded-xl border border-dashed border-gray-300 mb-8">
            <div class="flex items-center gap-3">
                <span class="text-xs font-bold text-gray-500 italic">備用工具：</span>
                <button onclick="fallbackWhiteRemove()" class="bg-white border border-gray-300 px-3 py-1.5 rounded-lg text-xs hover:bg-gray-50 transition">自動移除白底</button>
                <div class="flex items-center gap-2 text-xs">
                    <span class="text-gray-500">容差:</span>
                    <input type="range" id="tolerance" min="1" max="100" value="30" class="w-24 accent-blue-600">
                </div>
                <p class="text-[10px] text-gray-400 ml-auto">AI 失敗或背景為純白時可用</p>
            </div>
        </section>

        <section class="bg-gray-900 text-gray-300 p-6 rounded-2xl shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-white font-bold">授權與引用標示</h3>
                <button onclick="copyAttr()" class="text-xs bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg border border-gray-700 transition">複製標示</button>
            </div>
            <div id="attrInfo" class="text-sm space-y-1 font-mono leading-relaxed">
                尚未選擇圖片
            </div>
        </section>
    </div>

    <canvas id="mainCanvas" class="hidden"></canvas>

    <script type="module">
        // 匯入去背模組
        import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm";

        let imgList = [];
        let selectedIdx = -1;
        let searchOffset = 0;
        let resultBlob = null;

        // 全域掛載
        window.searchImages = searchImages;
        window.changeBatch = changeBatch;
        window.selectImage = selectImage;
        window.runAI = runAI;
        window.downloadPNG = downloadPNG;
        window.fallbackWhiteRemove = fallbackWhiteRemove;
        window.copyAttr = copyAttr;

        // 搜尋功能
        async function searchImages() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return showStatus("請先輸入關鍵字");
            searchOffset = 0;
            resetAll();
            await fetchWikimedia(query);
        }

        async function changeBatch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            searchOffset += 10;
            resetAll();
            await fetchWikimedia(query);
        }

        async function fetchWikimedia(q) {
            showStatus("搜尋中...", true);
            try {
                // Wikimedia API: 限定 File 空間, 至少 800px, JPEG/PNG
                const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(q)}&gsrnamespace=6&gsrlimit=20&gsroffset=${searchOffset}&prop=imageinfo&iiprop=url|size|extmeta|mime&format=json&origin=*`;
                const res = await fetch(url);
                const data = await res.json();

                if (!data.query) return showStatus("找不到圖片，請嘗試換個英文關鍵字");

                imgList = Object.values(data.query.pages)
                    .filter(p => p.imageinfo && p.imageinfo[0].width >= 800)
                    .filter(p => ['image/jpeg', 'image/png'].includes(p.imageinfo[0].mime))
                    .map(p => ({
                        title: p.title.replace("File:", "").split('.')[0],
                        url: p.imageinfo[0].url,
                        w: p.imageinfo[0].width,
                        h: p.imageinfo[0].height,
                        creator: p.imageinfo[0].extmeta?.Artist?.value.replace(/<[^>]*>?/gm, '') || "Unknown",
                        license: p.imageinfo[0].extmeta?.LicenseShortName?.value || "CC BY-SA",
                        source: `https://commons.wikimedia.org/wiki/${encodeURIComponent(p.title)}`
                    })).slice(0, 5);

                if (imgList.length === 0) {
                    showStatus("找不到足夠大的圖片，請按「換一批」試試");
                } else {
                    showStatus(`找到 ${imgList.length} 張圖片`);
                    renderCards();
                }
            } catch (e) {
                showStatus("連線失敗，請檢查網路");
            }
        }

        function renderCards() {
            const container = document.getElementById('resultsSection');
            container.innerHTML = imgList.map((img, i) => `
                <div class="img-card bg-white rounded-xl shadow-sm overflow-hidden cursor-pointer hover:shadow-md ${selectedIdx === i ? 'selected' : ''}" onclick="selectImage(${i})">
                    <div class="h-32 bg-gray-200">
                        <img src="${img.url}" class="w-full h-full object-cover" loading="lazy">
                    </div>
                    <div class="p-2 text-[10px] text-gray-500">
                        <p class="font-bold text-gray-700 truncate">${img.title}</p>
                        <p>${img.w} x ${img.h}</p>
                    </div>
                </div>
            `).join('');
        }

        function selectImage(i) {
            selectedIdx = i;
            renderCards();
            const img = imgList[i];
            
            document.getElementById('originalBox').innerHTML = `<img src="${img.url}" id="srcImg" crossorigin="anonymous" class="max-h-[500px] object-contain shadow-xl">`;
            document.getElementById('resTag').innerText = `${img.w} x ${img.h} PX`;
            document.getElementById('attrInfo').innerHTML = `
                <p><strong>圖片：</strong>${img.title}</p>
                <p><strong>作者：</strong>${img.creator}</p>
                <p><strong>授權：</strong>${img.license}</p>
                <p><strong>來源：</strong>${img.source}</p>
                <p><strong>平台：</strong>Wikimedia Commons</p>
            `;

            document.getElementById('aiBtn').disabled = false;
            document.getElementById('dlBtn').disabled = true;
            document.getElementById('resultBox').innerHTML = '<p class="text-gray-400 text-sm">等待去背指令...</p>';
            showStatus("已選取圖片");
        }

        // 一鍵 AI 去背
        async function runAI() {
            const btn = document.getElementById('aiBtn');
            const target = imgList[selectedIdx];
            btn.disabled = true;
            btn.innerHTML = '<span class="spin mr-2"></span> 正在處理中...';
            showStatus("AI 模型下載與計算中 (初次執行需 10-20 秒)...", true);

            try {
                // 重要：先 Fetch 成 Blob 解決 CORS 在 Worker 內的問題
                const blobRes = await fetch(target.url);
                const inputBlob = await blobRes.blob();

                // 執行 AI 去背
                const blob = await removeBackground(inputBlob, {
                    publicPath: "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/",
                    model: "small", // 提高穩定性
                    progress: (key, cur, total) => {
                        const p = Math.round((cur / total) * 100);
                        showStatus(`去背處理進度: ${p}%`, true);
                    }
                });

                resultBlob = blob;
                const url = URL.createObjectURL(blob);
                document.getElementById('resultBox').innerHTML = `<img src="${url}" class="max-h-[500px] object-contain drop-shadow-2xl">`;
                document.getElementById('dlBtn').disabled = false;
                showStatus("去背完成！");
            } catch (err) {
                console.error(err);
                showStatus("AI 處理失敗，可能是圖片解析度過高或瀏覽器限制。");
            } finally {
                btn.innerHTML = "一鍵 AI 去背";
                btn.disabled = false;
            }
        }

        // 備用：白底去背
        function fallbackWhiteRemove() {
            const img = document.getElementById('srcImg');
            if (!img) return;
            const cvs = document.getElementById('mainCanvas');
            const ctx = cvs.getContext('2d');
            const tol = document.getElementById('tolerance').value;

            cvs.width = img.naturalWidth;
            cvs.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);

            const data = ctx.getImageData(0, 0, cvs.width, cvs.height);
            for (let i = 0; i < data.data.length; i += 4) {
                const r = data.data[i], g = data.data[i+1], b = data.data[i+2];
                // 判斷是否接近白色
                if (r > 255 - tol && g > 255 - tol && b > 255 - tol) {
                    data.data[i+3] = 0;
                }
            }
            ctx.putImageData(data, 0, 0);
            cvs.toBlob(b => {
                resultBlob = b;
                document.getElementById('resultBox').innerHTML = `<img src="${URL.createObjectURL(b)}" class="max-h-[500px] object-contain">`;
                document.getElementById('dlBtn').disabled = false;
                showStatus("已完成白底去背");
            }, 'image/png');
        }

        function downloadPNG() {
            if (!resultBlob) return;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(resultBlob);
            a.download = `cc-image-removed-${Date.now()}.png`;
            a.click();
        }

        function copyAttr() {
            const text = document.getElementById('attrInfo').innerText;
            navigator.clipboard.writeText(text).then(() => alert("已複製標示文字"));
        }

        function showStatus(msg, spin = false) {
            const label = document.getElementById('statusLabel');
            label.innerHTML = spin ? `<span class="spin border-gray-400 border-t-blue-600 mr-2"></span> ${msg}` : msg;
        }

        function resetAll() {
            imgList = []; selectedIdx = -1; resultBlob = null;
            document.getElementById('resultsSection').innerHTML = '';
            document.getElementById('originalBox').innerHTML = '<p class="text-gray-400 text-sm">請先選擇圖片</p>';
            document.getElementById('resultBox').innerHTML = '<p class="text-gray-400 text-sm">去背結果會顯示在這裡</p>';
            document.getElementById('aiBtn').disabled = true;
            document.getElementById('dlBtn').disabled = true;
            document.getElementById('resTag').innerText = '';
            document.getElementById('attrInfo').innerText = '尚未選擇圖片';
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchImages();
        });
    </script>
</body>
</html>
