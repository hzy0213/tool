<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Image Master - 物品去背版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/deeplab@0.2.2/dist/deeplab.min.js"></script>
    
    <style>
        .checkboard {
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                              linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .loading-spin {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .img-card { border: 3px solid transparent; transition: 0.3s; cursor: pointer; }
        .img-card.selected { border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-slate-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2">CC Image Master</h1>
            <p class="text-slate-500 font-medium">搜尋 CC 圖片・智慧保留物品・一鍵去背</p>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="searchInput" placeholder="輸入關鍵字 (如: Cat, Coffee, Car, Robot)" 
                       class="flex-1 bg-gray-50 border-none rounded-2xl px-6 py-4 text-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                <button onclick="searchImages()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-10 py-4 rounded-2xl transition shadow-lg shadow-blue-200">
                    搜尋圖片
                </button>
                <button onclick="changeBatch()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-6 py-4 rounded-2xl transition">
                    換一批
                </button>
            </div>
            <div id="statusLabel" class="mt-4 text-sm font-medium text-slate-400 flex items-center gap-2 px-2">
                準備就緒。請輸入英文關鍵字搜尋。
            </div>
        </div>

        <section id="resultsSection" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-10">
            </section>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold">1. 原始圖片</h3>
                    <span id="resInfo" class="text-xs font-mono text-slate-400 bg-slate-100 px-2 py-1 rounded"></span>
                </div>
                <div id="originalBox" class="bg-slate-50 rounded-2xl min-h-[400px] flex items-center justify-center overflow-hidden border-2 border-dashed border-gray-200">
                    <p class="text-slate-300">請先選取上方圖片</p>
                </div>
                <button id="aiBtn" onclick="processAI()" disabled 
                        class="w-full mt-6 bg-slate-900 disabled:bg-gray-200 hover:bg-black text-white font-bold py-5 rounded-2xl shadow-xl transition flex items-center justify-center gap-3">
                    <span id="aiBtnLabel">啟動 AI 智慧去背</span>
                </button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold">2. 去背結果</h3>
                    <div class="flex items-center gap-2">
                         <span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded font-bold">PNG 透明格式</span>
                    </div>
                </div>
                <div id="resultBox" class="checkboard rounded-2xl min-h-[400px] flex items-center justify-center overflow-hidden border border-gray-100">
                    <p class="text-slate-300">等待 AI 處理...</p>
                </div>
                <button id="dlBtn" onclick="downloadImage()" disabled 
                        class="w-full mt-6 bg-emerald-500 disabled:bg-gray-200 hover:bg-emerald-600 text-white font-bold py-5 rounded-2xl shadow-xl transition">
                    下載透明 PNG
                </button>
            </div>
        </main>

        <section class="bg-blue-50 p-6 rounded-3xl border border-blue-100 mb-10">
            <div class="flex flex-col md:flex-row md:items-center gap-6">
                <div class="flex-1">
                    <h4 class="text-blue-900 font-bold mb-1 italic text-sm">💡 備用方案：傳統色差去背</h4>
                    <p class="text-blue-700 text-xs">如果 AI 無法辨識特定物品，且背景接近純白，請嘗試此功能。</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-blue-400 font-bold mb-1">容差度 (Tolerance)</span>
                        <input type="range" id="tolerance" min="1" max="100" value="30" class="accent-blue-600">
                    </div>
                    <button onclick="fallbackRemove()" class="bg-white border-2 border-blue-200 text-blue-600 font-bold px-6 py-3 rounded-xl hover:bg-blue-100 transition text-sm">
                        移除白色背景
                    </button>
                </div>
            </div>
        </section>

        <footer class="bg-slate-900 rounded-3xl p-8 text-slate-400 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-white font-bold flex items-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M7 9a2 2 0 100-4 2 2 0 000 4zM11 9a2 2 0 100-4 2 2 0 000 4zM13 5a1 1 0 11-2 0 1 1 0 012 0zM5 5a1 1 0 000 2 1 1 0 100-2zM3 9a2 2 0 100-4 2 2 0 000 4zM5 13a1 1 0 100-2 1 1 0 000 2zM11 13a1 1 0 100-2 1 1 0 000 2zM13 13a1 1 0 100-2 1 1 0 000 2zM17 9a2 2 0 100-4 2 2 0 000 4zM17 13a2 2 0 100-4 2 2 0 000 4z"></path></svg>
                    圖片來源與標註
                </h3>
                <button onclick="copyAttr()" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg transition border border-slate-700">複製資訊</button>
            </div>
            <pre id="attrBox" class="text-sm font-mono leading-relaxed whitespace-pre-wrap">尚未選取圖片...</pre>
        </footer>
    </div>

    <script>
        let imgList = [];
        let selectedIdx = -1;
        let searchOffset = 0;
        let model = null;

        // --- 搜尋功能 (Wikimedia API) ---
        async function searchImages() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return setStatus("請輸入關鍵字！");
            searchOffset = 0;
            await fetchFromWikimedia(query);
        }

        async function changeBatch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            searchOffset += 10;
            await fetchFromWikimedia(query);
        }

        async function fetchFromWikimedia(q) {
            setStatus("正在搜尋 CC 圖片庫...", true);
            try {
                const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(q)}&gsrnamespace=6&gsrlimit=10&gsroffset=${searchOffset}&prop=imageinfo&iiprop=url|size|extmeta|mime&format=json&origin=*`;
                const res = await fetch(url);
                const data = await res.json();

                if (!data.query) return setStatus("找不到符合的圖片。");

                imgList = Object.values(data.query.pages)
                    .filter(p => p.imageinfo && p.imageinfo[0].width >= 600)
                    .map(p => {
                        const info = p.imageinfo[0];
                        const meta = info.extmeta || {};
                        return {
                            url: info.url,
                            title: p.title.replace('File:', ''),
                            w: info.width,
                            h: info.height,
                            author: meta.Artist?.value.replace(/<[^>]*>?/gm, '') || 'Unknown',
                            license: meta.LicenseShortName?.value || 'CC BY-SA',
                            source: `https://commons.wikimedia.org/wiki/${encodeURIComponent(p.title)}`
                        };
                    });

                renderThumbnails();
                setStatus(`已為您準備 ${imgList.length} 張高清圖片`);
            } catch (e) {
                setStatus("搜尋發生錯誤。");
            }
        }

        function renderThumbnails() {
            const container = document.getElementById('resultsSection');
            container.innerHTML = imgList.map((img, i) => `
                <div class="img-card rounded-2xl overflow-hidden ${selectedIdx === i ? 'selected' : ''}" onclick="selectImage(${i})">
                    <img src="${img.url}" class="w-full h-32 object-cover" crossorigin="anonymous">
                </div>
            `).join('');
        }

        function selectImage(i) {
            selectedIdx = i;
            renderThumbnails();
            const img = imgList[i];
            
            // 載入預覽
            document.getElementById('originalBox').innerHTML = `<img src="${img.url}" id="srcImg" crossorigin="anonymous" class="max-h-full object-contain">`;
            document.getElementById('resInfo').innerText = `${img.w} x ${img.h} PX`;
            
            // 授權標註
            document.getElementById('attrBox').innerText = `【圖片標註資訊】\n標題: ${img.title}\n作者: ${img.author}\n授權: ${img.license}\n來源: ${img.source}`;
            
            // 按鈕狀態
            document.getElementById('aiBtn').disabled = false;
            document.getElementById('dlBtn').disabled = true;
            document.getElementById('resultBox').innerHTML = '<p class="text-slate-300">點擊按鈕，讓 AI 為您去背</p>';
        }

        // --- AI 去背核心 (DeepLab 版) ---
        async function processAI() {
            const btn = document.getElementById('aiBtn');
            const btnLabel = document.getElementById('aiBtnLabel');
            const srcImg = document.getElementById('srcImg');
            if (!srcImg) return;

            btn.disabled = true;
            btnLabel.innerHTML = '<div class="loading-spin"></div> AI 正在運算主體...';
            setStatus("正在載入 AI 模型 (初次執行約 10MB)...", true);

            try {
                // 1. 初始化模型 (只會在第一次執行時下載)
                if (!model) {
                    model = await deeplab.load({ base: 'pascal', quantizationBytes: 2 });
                }

                // 2. 影像分割預測
                setStatus("辨識圖片中的物品...", true);
                const prediction = await model.segment(srcImg);
                const { segmentationMap, width, height } = prediction;

                // 3. 像素處理 (保留物品類別，其餘透明)
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(srcImg, 0, 0, width, height);

                const imgData = ctx.getImageData(0, 0, width, height);
                const data = imgData.data;

                // DeepLab 的 segmentationMap 標記類別
                // 類別 0 為背景 (Background)，其餘為物品/人類
                for (let i = 0; i < segmentationMap.length; i++) {
                    const label = segmentationMap[i];
                    if (label === 0) {
                        data[i * 4 + 3] = 0; // 將背景像素設為透明
                    }
                }

                ctx.putImageData(imgData, 0, 0);

                // 4. 顯示結果
                const finalUrl = canvas.toDataURL('image/png');
                document.getElementById('resultBox').innerHTML = `<img src="${finalUrl}" id="finalImg" class="max-h-full object-contain drop-shadow-2xl">`;
                document.getElementById('dlBtn').disabled = false;
                setStatus("✅ 智慧去背成功！");

            } catch (err) {
                console.error(err);
                setStatus("去背失敗，請換一張圖再試。");
            } finally {
                btn.disabled = false;
                btnLabel.innerText = "啟動 AI 智慧去背";
            }
        }

        // --- 備用方案：色差去背 ---
        function fallbackRemove() {
            const srcImg = document.getElementById('srcImg');
            if (!srcImg) return;
            
            const tol = document.getElementById('tolerance').value;
            const canvas = document.createElement('canvas');
            canvas.width = srcImg.naturalWidth;
            canvas.height = srcImg.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(srcImg, 0, 0);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                // 檢測接近白色的像素
                if (r > 255 - tol && g > 255 - tol && b > 255 - tol) {
                    data[i+3] = 0;
                }
            }
            ctx.putImageData(imgData, 0, 0);
            
            const finalUrl = canvas.toDataURL('image/png');
            document.getElementById('resultBox').innerHTML = `<img src="${finalUrl}" id="finalImg" class="max-h-full object-contain">`;
            document.getElementById('dlBtn').disabled = false;
            setStatus("✅ 已手動移除背景。");
        }

        // --- 公用功能 ---
        function downloadImage() {
            const img = document.getElementById('finalImg');
            if (!img) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `removed-bg-${Date.now()}.png`;
            link.click();
        }

        function setStatus(msg, spin = false) {
            const el = document.getElementById('statusLabel');
            el.innerHTML = spin ? `<div class="loading-spin !border-blue-500 !border-t-transparent !w-4 !h-4"></div> ${msg}` : msg;
        }

        function copyAttr() {
            const txt = document.getElementById('attrBox').innerText;
            navigator.clipboard.writeText(txt).then(() => alert("引用資訊已複製到剪貼簿！"));
        }

        // 監聽 Enter 鍵搜尋
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchImages();
        });
    </script>
</body>
</html>
