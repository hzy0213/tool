<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Image Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .checkboard {
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                              linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .image-card { transition: all 0.2s ease; border: 2px solid transparent; }
        .image-card.selected { border-color: #2563eb; background-color: #eff6ff; }
        .loading-ring {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%; border-top-color: #3b82f6;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">CC Image Background Remover</h1>
            <p class="text-gray-500">搜尋 CC 圖片，選圖，一鍵去背，下載透明 PNG</p>
            
            <div class="flex flex-wrap justify-center gap-4 mt-8">
                <div class="bg-white px-5 py-3 rounded-xl shadow-sm border border-gray-100 flex items-center gap-3">
                    <span class="bg-blue-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center font-bold">1</span>
                    <span class="text-sm">搜尋圖片</span>
                </div>
                <div class="bg-white px-5 py-3 rounded-xl shadow-sm border border-gray-100 flex items-center gap-3">
                    <span class="bg-blue-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center font-bold">2</span>
                    <span class="text-sm">選擇圖片</span>
                </div>
                <div class="bg-white px-5 py-3 rounded-xl shadow-sm border border-gray-100 flex items-center gap-3">
                    <span class="bg-blue-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center font-bold">3</span>
                    <span class="text-sm">去背下載</span>
                </div>
            </div>
        </header>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="searchInput" placeholder="輸入關鍵字，例如 cat, robot, landscape..." 
                       class="flex-1 border border-gray-200 rounded-xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                <button onclick="searchImages()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-xl transition">搜尋圖片</button>
                <button onclick="changeBatch()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-6 py-3 rounded-xl transition">換一批</button>
            </div>
            <div id="statusLabel" class="mt-4 text-sm font-medium text-gray-600 flex items-center gap-2 h-5">
                </div>
        </section>

        <section id="resultsSection" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-5 mb-12">
            </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg">1. 原始圖片</h3>
                    <span id="originalSize" class="text-xs text-gray-400 font-mono"></span>
                </div>
                <div id="originalContainer" class="bg-gray-50 rounded-xl overflow-hidden flex items-center justify-center min-h-[350px] border border-gray-50">
                    <p class="text-gray-400">尚未選取圖片</p>
                </div>
                <div class="mt-6">
                    <button id="aiBtn" onclick="removeSelectedImageBackground()" disabled 
                            class="w-full bg-blue-600 disabled:bg-gray-200 disabled:cursor-not-allowed hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-blue-100">
                        一鍵 AI 去背
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-lg mb-4">2. 去背結果</h3>
                <div id="resultContainer" class="checkboard rounded-xl overflow-hidden flex items-center justify-center min-h-[350px] border border-gray-50 relative">
                    <p class="text-gray-400">去背後結果會顯示在此</p>
                </div>
                <button id="downloadBtn" onclick="downloadPNG()" disabled 
                        class="mt-6 w-full bg-emerald-600 disabled:bg-gray-200 disabled:cursor-not-allowed hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-50">
                    下載透明 PNG
                </button>
            </div>
        </section>

        <section class="bg-blue-50/50 p-6 rounded-2xl border border-blue-100 mb-12">
            <div class="flex items-center gap-2 mb-3">
                <h4 class="font-bold text-blue-800 text-sm italic">備用 Canvas 工具</h4>
                <span class="text-[10px] text-blue-500">(AI 失敗或針對單色背景時使用)</span>
            </div>
            <div class="flex flex-wrap gap-4 items-center">
                <button onclick="fallbackWhiteRemove()" class="bg-white border border-blue-200 text-blue-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-100 transition">自動移除白底</button>
                <div class="h-4 w-px bg-blue-200"></div>
                <div class="flex items-center gap-3">
                    <label class="text-xs font-bold text-blue-700">色彩容差:</label>
                    <input type="range" id="tolerance" min="1" max="150" value="40" class="w-32 accent-blue-600">
                </div>
            </div>
        </section>

        <section class="bg-gray-900 text-white p-8 rounded-2xl shadow-xl">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 class="font-bold text-xl mb-1">圖片授權資訊</h3>
                    <p class="text-gray-400 text-sm">使用本站搜尋到的圖片時，請標註來源</p>
                </div>
                <button id="copyBtn" onclick="copyAttribution()" class="bg-gray-800 hover:bg-gray-700 text-sm px-4 py-2 rounded-lg transition border border-gray-700">複製標示</button>
            </div>
            <div id="attributionInfo" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-300">
                <p>尚未選擇圖片</p>
            </div>
        </section>
    </div>

    <canvas id="processCanvas" class="hidden"></canvas>

    <script type="module">
        // 匯入 @imgly/background-removal (指定版本確保穩定)
        import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm";

        let currentImageData = [];
        let selectedIndex = -1;
        let batchOffset = 0;
        let processedBlob = null;

        window.searchImages = searchImages;
        window.changeBatch = changeBatch;
        window.selectImage = selectImage;
        window.removeSelectedImageBackground = removeSelectedImageBackground;
        window.downloadPNG = downloadPNG;
        window.copyAttribution = copyAttribution;
        window.fallbackWhiteRemove = fallbackWhiteRemove;

        // 搜尋邏輯
        async function searchImages() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return showStatus("請先輸入關鍵字");
            batchOffset = 0;
            resetUI();
            await performFetch(query);
        }

        async function changeBatch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            batchOffset += 30; // 擴大位移，確保能跳過不符合格式的圖
            resetUI();
            await performFetch(query);
        }

        async function performFetch(query) {
            showStatus("正在向 Wikimedia Commons 搜尋圖片...", true);
            try {
                // 取得更多屬性，包含 mime 格式
                const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrnamespace=6&gsrlimit=50&gsroffset=${batchOffset}&prop=imageinfo&iiprop=url|size|extmeta|mime&format=json&origin=*`;
                
                const resp = await fetch(url);
                const data = await resp.json();

                if (!data.query || !data.query.pages) {
                    showStatus("找不到相關圖片，請嘗試其他英文關鍵字 (例如: dog, tree, building)");
                    return;
                }

                const pages = Object.values(data.query.pages);
                
                // 嚴格過濾條件：大於 800x600，且必須是 JPEG 或 PNG (避免 SVG 壞圖)
                currentImageData = pages
                    .filter(p => p.imageinfo && p.imageinfo[0].width >= 800 && p.imageinfo[0].height >= 600)
                    .filter(p => p.imageinfo[0].mime === 'image/jpeg' || p.imageinfo[0].mime === 'image/png')
                    .map(p => {
                        const info = p.imageinfo[0];
                        const meta = info.extmeta || {};
                        return {
                            title: p.title.replace("File:", "").split('.')[0],
                            creator: meta.Artist ? meta.Artist.value.replace(/<[^>]*>?/gm, '') : "Unknown",
                            license: meta.LicenseShortName ? meta.LicenseShortName.value : "Public Domain",
                            licenseUrl: meta.LicenseUrl ? meta.LicenseUrl.value : "#",
                            imageUrl: info.url,
                            width: info.width,
                            height: info.height,
                            provider: "Wikimedia Commons"
                        };
                    }).slice(0, 5); // 取前 5 張

                if (currentImageData.length === 0) {
                    showStatus("找到的圖片尺寸太小或非 JPG/PNG 格式，請按「換一批」或換關鍵字");
                } else {
                    showStatus(`找到 5 張高品質圖片，請選擇一張進行去背`);
                    renderCards();
                }
            } catch (err) {
                showStatus("API 搜尋失敗，請檢查網路狀態");
                console.error(err);
            }
        }

        function renderCards() {
            const container = document.getElementById('resultsSection');
            container.innerHTML = currentImageData.map((img, idx) => `
                <div class="image-card bg-white rounded-xl shadow-sm overflow-hidden cursor-pointer hover:shadow-lg ${selectedIndex === idx ? 'selected' : ''}" 
                     onclick="selectImage(${idx})">
                    <div class="h-40 bg-gray-100 relative">
                        <img src="${img.imageUrl}" class="w-full h-full object-cover" loading="lazy" crossorigin="anonymous">
                        ${selectedIndex === idx ? '<div class="absolute top-2 right-2 bg-blue-600 text-white text-[10px] px-2 py-1 rounded-md font-bold shadow-md">已選取</div>' : ''}
                    </div>
                    <div class="p-3">
                        <p class="text-xs font-bold truncate text-gray-700" title="${img.title}">${img.title}</p>
                        <p class="text-[10px] text-gray-400 mt-1">${img.width} x ${img.height}</p>
                    </div>
                </div>
            `).join('');
        }

        function selectImage(idx) {
            selectedIndex = idx;
            renderCards();
            const img = currentImageData[idx];
            
            document.getElementById('originalContainer').innerHTML = `<img src="${img.imageUrl}" id="targetImg" crossorigin="anonymous" class="max-h-[500px] object-contain shadow-2xl">`;
            document.getElementById('originalSize').innerText = `${img.width} x ${img.height} PX`;
            
            document.getElementById('attributionInfo').innerHTML = `
                <div><span class="text-gray-500 block mb-1">標題</span>${img.title}</div>
                <div><span class="text-gray-500 block mb-1">作者</span>${img.creator}</div>
                <div><span class="text-gray-500 block mb-1">授權協議</span><a href="${img.licenseUrl}" target="_blank" class="text-blue-400 hover:underline">${img.license}</a></div>
                <div><span class="text-gray-500 block mb-1">來源平台</span>${img.provider}</div>
            `;

            document.getElementById('aiBtn').disabled = false;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('resultContainer').innerHTML = '<p class="text-gray-400">等待處理...</p>';
            showStatus("已選圖！可點擊「一鍵 AI 去背」");
        }

        // AI 去背主功能
        async function removeSelectedImageBackground() {
            if (selectedIndex === -1) return;
            const btn = document.getElementById('aiBtn');
            const img = currentImageData[selectedIndex];
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-ring mr-2"></span> 模型載入與處理中...';
            showStatus("AI 模型下載與處理中 (若為初次執行約需 10~30 秒，請勿關閉網頁)...", true);

            try {
                // 1. 為了避免 Worker 發生 CORS 錯誤，先將圖片 Fetch 下來轉成 Blob
                const imgResponse = await fetch(img.imageUrl, { cache: 'no-cache' });
                const imageBlob = await imgResponse.blob();

                // 2. 設定 AI 模組設定檔：極其重要，指定 publicPath 讓其在 GitHub Pages 也能抓到模型檔
                const config = {
                    publicPath: "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/",
                    model: "medium", // 畫質與速度的平衡
                    progress: (key, current, total) => {
                        const percent = Math.round((current / total) * 100);
                        if(percent > 0) showStatus(`AI 運算中: ${key} (${percent}%)`, true);
                    }
                };

                // 3. 呼叫去背函式
                const blob = await removeBackground(imageBlob, config);

                // 4. 渲染結果
                processedBlob = blob;
                const url = URL.createObjectURL(blob);
                document.getElementById('resultContainer').innerHTML = `<img src="${url}" class="max-h-[500px] object-contain drop-shadow-2xl">`;
                
                document.getElementById('downloadBtn').disabled = false;
                showStatus("✅ 去背完成！可以下載了。");

            } catch (err) {
                showStatus("❌ AI 去背失敗。請嘗試下方的「自動移除白底」備用工具。");
                console.error("AI Error:", err);
            } finally {
                btn.innerHTML = "一鍵 AI 去背";
                btn.disabled = false;
            }
        }

        // Canvas 備用去背 (移除白底)
        function fallbackWhiteRemove() {
            const imgElement = document.getElementById('targetImg');
            if (!imgElement) return showStatus("請先選擇圖片");

            const canvas = document.getElementById('processCanvas');
            const ctx = canvas.getContext('2d');
            const tol = parseInt(document.getElementById('tolerance').value);

            canvas.width = imgElement.naturalWidth;
            canvas.height = imgElement.naturalHeight;
            
            try {
                ctx.drawImage(imgElement, 0, 0);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    if (r > 255 - tol && g > 255 - tol && b > 255 - tol) {
                        data[i+3] = 0; // 將接近白色的像素透明化
                    }
                }

                ctx.putImageData(imgData, 0, 0);
                canvas.toBlob((blob) => {
                    processedBlob = blob;
                    const url = URL.createObjectURL(blob);
                    document.getElementById('resultContainer').innerHTML = `<img src="${url}" class="max-h-[500px] object-contain">`;
                    document.getElementById('downloadBtn').disabled = false;
                    showStatus("✅ Canvas 白底去背完成");
                });
            } catch (e) {
                showStatus("❌ 圖片受跨域限制，無法使用 Canvas 處理");
                console.error(e);
            }
        }

        function downloadPNG() {
            if (!processedBlob) return;
            const url = URL.createObjectURL(processedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cc-removed-${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function copyAttribution() {
            if (selectedIndex === -1) return;
            const info = currentImageData[selectedIndex];
            const text = `圖片名稱: ${info.title}\n作者: ${info.creator}\n授權: ${info.license}\n來源: ${info.provider}`;
            navigator.clipboard.writeText(text).then(() => alert("已複製授權標示到剪貼簿！"));
        }

        function resetUI() {
            selectedIndex = -1;
            processedBlob = null;
            document.getElementById('resultsSection').innerHTML = '';
            document.getElementById('originalContainer').innerHTML = '<p class="text-gray-400">尚未選取圖片</p>';
            document.getElementById('resultContainer').innerHTML = '<p class="text-gray-400">去背後結果會顯示在此</p>';
            document.getElementById('aiBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('attributionInfo').innerHTML = '<p>尚未選擇圖片</p>';
            document.getElementById('originalSize').innerText = '';
        }

        function showStatus(msg, isLoading = false) {
            const label = document.getElementById('statusLabel');
            label.innerHTML = isLoading ? `<span class="loading-ring"></span> <span class="text-blue-600">${msg}</span>` : msg;
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchImages();
        });
    </script>
</body>
</html>
