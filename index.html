<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Image Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 透明棋盤格背景 */
        .checkboard {
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                              linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .image-card.selected { border: 3px solid #2563eb; }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">CC Image Background Remover</h1>
            <p class="text-gray-500">搜尋 CC 圖片，選圖，一鍵去背，下載透明 PNG</p>
            
            <div class="flex flex-wrap justify-center gap-4 mt-6">
                <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex items-center gap-2">
                    <span class="bg-blue-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center">1</span>
                    <span class="text-sm font-medium">搜尋圖片</span>
                </div>
                <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex items-center gap-2">
                    <span class="bg-blue-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center">2</span>
                    <span class="text-sm font-medium">選擇圖片</span>
                </div>
                <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex items-center gap-2">
                    <span class="bg-blue-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center">3</span>
                    <span class="text-sm font-medium">去背下載</span>
                </div>
            </div>
        </header>

        <section class="bg-white p-6 rounded-xl shadow-md mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="searchInput" placeholder="輸入關鍵字，例如 cat、robot、flower" 
                       class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="searchImages()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded-lg transition">搜尋圖片</button>
                <button onclick="changeBatch()" class="bg-gray-600 hover:bg-gray-700 text-white font-medium px-6 py-2 rounded-lg transition">換一批</button>
            </div>
            <div id="statusLabel" class="mt-4 text-sm text-gray-500 flex items-center gap-2">
                等待搜尋...
            </div>
        </section>

        <section id="resultsSection" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-10">
            </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h3 class="font-bold mb-4 flex justify-between items-center">
                    原圖預覽 
                    <span id="originalSize" class="text-xs font-normal text-gray-400"></span>
                </h3>
                <div id="originalContainer" class="bg-gray-100 rounded-lg overflow-hidden flex items-center justify-center min-h-[300px]">
                    <p class="text-gray-400">請先選擇圖片</p>
                </div>
                <div class="mt-6 flex flex-wrap gap-3">
                    <button id="aiBtn" onclick="removeSelectedImageBackground()" disabled 
                            class="bg-blue-600 disabled:bg-gray-300 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition flex-1">
                        一鍵 AI 去背
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <h3 class="font-bold mb-4">去背結果</h3>
                <div id="resultContainer" class="checkboard rounded-lg overflow-hidden flex items-center justify-center min-h-[300px] relative">
                    <p class="text-gray-400">去背結果會顯示在這裡</p>
                </div>
                <button id="downloadBtn" onclick="downloadPNG()" disabled 
                        class="mt-6 w-full bg-green-600 disabled:bg-gray-300 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg transition">
                    下載透明 PNG
                </button>
            </div>
        </section>

        <section class="bg-gray-100 p-4 rounded-xl mb-10 border border-dashed border-gray-400">
            <h4 class="text-sm font-bold text-gray-600 mb-2 italic">備用去背工具 (AI 失敗時可用)</h4>
            <div class="flex flex-wrap gap-4 items-center">
                <button onclick="fallbackWhiteRemove()" class="bg-white border border-gray-300 px-3 py-1 rounded text-xs hover:bg-gray-50">白底去背</button>
                <div class="flex items-center gap-2">
                    <span class="text-xs">容差:</span>
                    <input type="range" id="tolerance" min="0" max="100" value="30" class="w-24">
                </div>
                <p class="text-[10px] text-gray-400">適用於單色背景</p>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-md">
            <h3 class="font-bold mb-4">授權標示</h3>
            <div id="attributionInfo" class="text-sm text-gray-600 space-y-1">
                尚未選擇圖片
            </div>
            <button id="copyBtn" onclick="copyAttribution()" class="mt-4 text-blue-600 hover:underline text-sm font-medium">
                複製標示
            </button>
        </section>
    </div>

    <canvas id="processCanvas" class="hidden"></canvas>

    <script type="module">
        // 匯入 AI 去背套件
        import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm";

        let currentImageData = [];
        let selectedIndex = -1;
        let batchOffset = 0;
        let processedBlob = null;

        // 監聽 Enter 鍵
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchImages();
        });

        // 搜尋主函式
        window.searchImages = async () => {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showStatus("請先輸入關鍵字");
                return;
            }
            batchOffset = 0;
            resetSelection();
            await performSearch(query);
        };

        // 換一批
        window.changeBatch = async () => {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            batchOffset += 5;
            resetSelection();
            await performSearch(query);
        };

        // 執行搜尋邏輯
        async function performSearch(query) {
            showStatus("搜尋中...", true);
            try {
                let images = await fetchWikimediaImages(query, batchOffset);
                
                // 如果 Wikimedia 不足 5 張，嘗試 Openverse (此處以 Wikimedia 為主)
                if (images.length < 5) {
                    showStatus(`找到 ${images.length} 張圖片，正在補充...`);
                }

                currentImageData = images.slice(0, 5);
                
                if (currentImageData.length === 0) {
                    showStatus("找不到圖片");
                } else {
                    showStatus(`找到 ${currentImageData.length} 張圖片`);
                    renderImageCards();
                }
            } catch (err) {
                showStatus("圖片載入失敗");
                console.error(err);
            }
        }

        // Fetch Wikimedia Commons
        async function fetchWikimediaImages(query, offset) {
            const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrlimit=20&gsroffset=${offset}&prop=imageinfo&iiprop=url|size|extmeta&format=json&origin=*`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (!data.query) return [];

            const pages = Object.values(data.query.pages);
            const filtered = pages
                .filter(p => p.imageinfo && p.imageinfo[0].width >= 800 && p.imageinfo[0].height >= 600)
                .map(p => {
                    const info = p.imageinfo[0];
                    const meta = info.extmeta || {};
                    return {
                        title: p.title.replace("File:", ""),
                        creator: meta.Artist ? meta.Artist.value.replace(/<[^>]*>?/gm, '') : "未知",
                        license: meta.LicenseShortName ? meta.LicenseShortName.value : "CC BY-SA",
                        licenseUrl: meta.LicenseUrl ? meta.LicenseUrl.value : "#",
                        imageUrl: info.url,
                        thumbnailUrl: info.url + "?width=400", // 簡單縮圖
                        sourceUrl: `https://commons.wikimedia.org/wiki/${encodeURIComponent(p.title)}`,
                        width: info.width,
                        height: info.height,
                        provider: "Wikimedia Commons"
                    };
                });
            return filtered;
        }

        // 渲染卡片
        window.renderImageCards = () => {
            const container = document.getElementById('resultsSection');
            container.innerHTML = currentImageData.map((img, idx) => `
                <div class="image-card bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden cursor-pointer hover:shadow-md transition ${selectedIndex === idx ? 'selected' : ''}" 
                     onclick="selectImage(${idx})">
                    <div class="h-40 overflow-hidden bg-gray-200">
                        <img src="${img.thumbnailUrl}" class="w-full h-full object-cover" alt="${img.title}">
                    </div>
                    <div class="p-3">
                        <p class="text-xs font-bold truncate">${img.title}</p>
                        <p class="text-[10px] text-gray-500">${img.license} | ${img.width}x${img.height}</p>
                        <div class="mt-2 flex justify-between items-center">
                             <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded">${selectedIndex === idx ? '已選取' : '選擇'}</span>
                             <a href="${img.sourceUrl}" target="_blank" class="text-[10px] text-gray-400 hover:underline" onclick="event.stopPropagation()">來源</a>
                        </div>
                    </div>
                </div>
            `).join('');
        };

        // 選擇圖片
        window.selectImage = (idx) => {
            selectedIndex = idx;
            renderImageCards();
            loadSelectedImage();
            showStatus("已選取圖片");
            
            // 重置去背狀態
            document.getElementById('resultContainer').innerHTML = '<p class="text-gray-400">去背結果會顯示在這裡</p>';
            document.getElementById('aiBtn').disabled = false;
            document.getElementById('downloadBtn').disabled = true;
            processedBlob = null;
        };

        // 載入預覽
        function loadSelectedImage() {
            const img = currentImageData[selectedIndex];
            const container = document.getElementById('originalContainer');
            container.innerHTML = `<img src="${img.imageUrl}" id="targetImg" crossorigin="anonymous" class="max-h-[500px] object-contain">`;
            document.getElementById('originalSize').innerText = `${img.width} x ${img.height}`;
            
            // 更新授權
            document.getElementById('attributionInfo').innerHTML = `
                <p><strong>圖片：</strong> ${img.title}</p>
                <p><strong>作者：</strong> ${img.creator}</p>
                <p><strong>授權：</strong> <a href="${img.licenseUrl}" target="_blank" class="text-blue-500 underline">${img.license}</a></p>
                <p><strong>來源：</strong> <a href="${img.sourceUrl}" target="_blank" class="text-blue-500 underline">連結</a></p>
                <p><strong>平台：</strong> ${img.provider}</p>
            `;
        }

        // 一鍵 AI 去背
        window.removeSelectedImageBackground = async () => {
            if (selectedIndex === -1) return;
            
            const btn = document.getElementById('aiBtn');
            btn.innerText = "去背中...";
            btn.disabled = true;
            showStatus("正在下載 AI 模型並處理 (約需 10-30 秒)...", true);

            try {
                const img = currentImageData[selectedIndex];
                // 執行 AI 去背
                const resultBlob = await removeBackground(img.imageUrl, {
                    progress: (res, progress) => {
                        showStatus(`去背中: ${Math.round(progress * 100)}%`, true);
                    }
                });

                processedBlob = resultBlob;
                const url = URL.createObjectURL(resultBlob);
                showRemovedResult(url);
                showStatus("去背完成");
            } catch (err) {
                console.error(err);
                showStatus("AI 去背失敗，圖片可能限制存取 (CORS)");
            } finally {
                btn.innerText = "一鍵 AI 去背";
                btn.disabled = false;
            }
        };

        // 顯示去背結果
        function showRemovedResult(url) {
            const container = document.getElementById('resultContainer');
            container.innerHTML = `<img src="${url}" class="max-h-[500px] object-contain">`;
            document.getElementById('downloadBtn').disabled = false;
        }

        // 下載功能
        window.downloadPNG = () => {
            if (!processedBlob) return;
            const url = URL.createObjectURL(processedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "cc-image-removed-background.png";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        // 複製標示
        window.copyAttribution = () => {
            if (selectedIndex === -1) return;
            const text = document.getElementById('attributionInfo').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("已複製授權資訊");
            }).catch(() => {
                showStatus("複製失敗");
            });
        };

        // 備用：白底去背 (Canvas 像素處理)
        window.fallbackWhiteRemove = () => {
            const imgElement = document.getElementById('targetImg');
            if (!imgElement) return;

            const canvas = document.getElementById('processCanvas');
            const ctx = canvas.getContext('2d');
            const tolerance = document.getElementById('tolerance').value;

            canvas.width = imgElement.naturalWidth;
            canvas.height = imgElement.naturalHeight;
            
            try {
                ctx.drawImage(imgElement, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                // 遍歷像素，如果接近白色 (255,255,255) 則設為透明
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    if (r > 255 - tolerance && g > 255 - tolerance && b > 255 - tolerance) {
                        data[i+3] = 0; // Alpha 設為 0
                    }
                }

                ctx.putImageData(imageData, 0, 0);
                canvas.toBlob((blob) => {
                    processedBlob = blob;
                    showRemovedResult(canvas.toDataURL());
                    showStatus("完成簡易去背");
                }, 'image/png');
            } catch (e) {
                showStatus("圖片無法處理，請換一張 (CORS)");
            }
        };

        // 重置選取
        function resetSelection() {
            selectedIndex = -1;
            processedBlob = null;
            document.getElementById('resultsSection').innerHTML = '';
            document.getElementById('originalContainer').innerHTML = '<p class="text-gray-400">請先選擇圖片</p>';
            document.getElementById('resultContainer').innerHTML = '<p class="text-gray-400">去背結果會顯示在這裡</p>';
            document.getElementById('originalSize').innerText = '';
            document.getElementById('aiBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('attributionInfo').innerText = '尚未選擇圖片';
        }

        // 狀態顯示
        function showStatus(msg, isLoading = false) {
            const label = document.getElementById('statusLabel');
            label.innerHTML = isLoading ? `<div class="loading-spinner"></div> ${msg}` : msg;
        }

    </script>
</body>
</html>
